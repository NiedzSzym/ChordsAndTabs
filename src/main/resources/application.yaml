spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
  flyway:
    enabled: true
    locations: classpath:db/migration
  application:
    name: ChordsAndTabs
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 587
    username: YOUR_MAILTRAP_USER
    password: YOUR_MAILTRAP_PASS
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

