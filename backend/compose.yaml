services:
  app:
    profiles: ["prod"]
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mydatabase
      - DB_USER=myuser
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - JWT_SECRET=${JWT_SECRET:-my-super-secret-jwt-key-that-is-at-least-256-bits-long}
      - MAIL_HOST=${MAIL_HOST:-sandbox.smtp.mailtrap.io}
      - MAIL_USER=${MAIL_USER:-api}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U myuser -d mydatabase
      interval: 5s
      retries: 5
volumes:
  postgres_data:
